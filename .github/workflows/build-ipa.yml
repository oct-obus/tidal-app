name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.13"
  PYTHON_BUILD: "b13"

jobs:
  build-ios:
    name: 🍎 Build unsigned IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate platform files
        run: flutter create --org com.obus --project-name tidal_app .

      - run: flutter pub get

      # --- Python Integration ---

      - name: Download Python iOS support
        run: |
          curl -sL -o python-ios.tar.gz \
            "https://github.com/beeware/Python-Apple-support/releases/download/${{ env.PYTHON_VERSION }}-${{ env.PYTHON_BUILD }}/Python-${{ env.PYTHON_VERSION }}-iOS-support.${{ env.PYTHON_BUILD }}.tar.gz"
          mkdir -p ios/PythonSupport
          tar xzf python-ios.tar.gz -C ios/PythonSupport

      - name: Place Python.xcframework
        run: mv ios/PythonSupport/Python.xcframework ios/Python.xcframework

      - name: Copy Python bridge into project
        run: cp scripts/PythonBridge.swift ios/Runner/PythonBridge.swift

      - name: Register plugin in AppDelegate
        run: |
          sed -i '' 's/GeneratedPluginRegistrant.register(with: self)/GeneratedPluginRegistrant.register(with: self)\n    PythonBridgePlugin.register(with: self.registrar(forPlugin: "PythonBridgePlugin")!)/' ios/Runner/AppDelegate.swift

      - name: Install xcodeproj gem
        run: gem install xcodeproj --no-document

      - name: Modify Xcode project for Python
        run: ruby scripts/setup_python.rb

      - name: Create Python app directories
        run: |
          mkdir -p ios/Runner/python/app
          mkdir -p ios/Runner/python/app_packages

      # --- Install tiddl + dependencies ---

      - name: Install Python packages
        run: |
          python3 -m pip install --upgrade pip
          # Install tiddl and all deps to a target directory
          pip3 install tiddl --target=python_packages_built --no-compile
          # Install certifi for SSL certs
          pip3 install certifi --target=python_packages_built --no-compile
          echo "Installed packages:"
          ls python_packages_built/

      - name: Clean packages for iOS
        run: |
          cd python_packages_built
          # Remove macOS-only .so/.dylib files (wrong architecture)
          find . -name "*.so" -delete
          find . -name "*.dylib" -delete
          # Remove dist-info to save space
          find . -name "*.dist-info" -type d -exec rm -rf {} + 2>/dev/null || true
          # Remove __pycache__
          find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          # Remove tests
          find . -name "tests" -type d -exec rm -rf {} + 2>/dev/null || true
          find . -name "test" -type d -exec rm -rf {} + 2>/dev/null || true
          # Remove pydantic and pydantic_core (we use our own shim)
          rm -rf pydantic pydantic_core
          # Remove ffmpeg_asyncio (we use our own shim)
          rm -rf ffmpeg_asyncio
          cd ..
          echo "Cleaned packages size: $(du -sh python_packages_built | cut -f1)"

      # --- Build ---

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      # --- Post-build: Install Python into app bundle ---

      - name: Install Python into app bundle
        run: |
          chmod +x scripts/post_build.sh
          bash scripts/post_build.sh \
            build/ios/iphoneos/Runner.app \
            ios/Python.xcframework

      - name: Package IPA
        working-directory: build/ios/iphoneos
        run: |
          mkdir Payload
          mv Runner.app Payload/
          zip -qq -r -9 TidalApp.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TidalApp-unsigned
          path: build/ios/iphoneos/TidalApp.ipa
