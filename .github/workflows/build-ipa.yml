name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.13"
  PYTHON_BUILD: "b13"

jobs:
  test-simulator:
    name: 📱 Simulator smoke test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate platform files
        run: flutter create --org com.obus --project-name tidal_app .

      - name: Configure iOS capabilities
        run: |
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" ios/Runner/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" ios/Runner/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :UIBackgroundModes:0 audio" ios/Runner/Info.plist

      - run: flutter pub get

      - name: Download Python iOS support
        run: |
          curl -sL -o python-ios.tar.gz \
            "https://github.com/beeware/Python-Apple-support/releases/download/${{ env.PYTHON_VERSION }}-${{ env.PYTHON_BUILD }}/Python-${{ env.PYTHON_VERSION }}-iOS-support.${{ env.PYTHON_BUILD }}.tar.gz"
          mkdir -p ios/PythonSupport
          tar xzf python-ios.tar.gz -C ios/PythonSupport

      - name: Place Python.xcframework
        run: mv ios/PythonSupport/Python.xcframework ios/Python.xcframework

      - name: Setup project for Python
        run: |
          cp scripts/PythonBridge.swift ios/Runner/PythonBridge.swift
          cp scripts/AudioBridge.swift ios/Runner/AudioBridge.swift
          cat > ios/Runner/AppDelegate.swift << 'SWIFT'
          import Flutter
          import UIKit

          @main
          @objc class AppDelegate: FlutterAppDelegate {
            override func application(
              _ application: UIApplication,
              didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?
            ) -> Bool {
              GeneratedPluginRegistrant.register(with: self)
              PythonBridgePlugin.register(with: self.registrar(forPlugin: "PythonBridgePlugin")!)
              AudioBridgePlugin.register(with: self.registrar(forPlugin: "AudioBridgePlugin")!)
              return super.application(application, didFinishLaunchingWithOptions: launchOptions)
            }
          }
          SWIFT
          gem install xcodeproj --no-document
          ruby scripts/setup_python.rb
          mkdir -p ios/Runner/python/app ios/Runner/python/app_packages

      - name: Install Python packages
        run: |
          python3 -m venv /tmp/pip-venv
          source /tmp/pip-venv/bin/activate
          pip install tiddl --target=python_packages_built --no-compile
          pip install certifi --target=python_packages_built --no-compile
          deactivate

      - name: Clean packages for iOS
        run: |
          cd python_packages_built
          find . -name "*.so" -delete && find . -name "*.dylib" -delete
          find . -name "*.dist-info" -type d -exec rm -rf {} + 2>/dev/null || true
          find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find . \( -name "tests" -o -name "test" \) -type d -exec rm -rf {} + 2>/dev/null || true
          rm -rf pydantic pydantic_core ffmpeg_asyncio

      - name: Verify tiddl package integrity
        run: |
          echo "=== Verify tiddl v3 package ==="
          for f in tiddl/__init__.py tiddl/core/__init__.py tiddl/core/auth/__init__.py tiddl/core/auth/api.py tiddl/core/auth/client.py tiddl/core/auth/models.py tiddl/core/api/__init__.py tiddl/core/api/api.py tiddl/core/api/client.py tiddl/core/utils/download.py tiddl/cli/utils/resource.py; do
            if [ -f "python_packages_built/$f" ]; then echo "  ✓ $f"
            else echo "  ✗ $f MISSING!"; exit 1; fi
          done
          echo "=== Verify other critical packages ==="
          for pkg in requests urllib3 idna certifi mutagen m3u8 requests_cache; do
            if [ -d "python_packages_built/$pkg" ]; then echo "  ✓ $pkg/"
            else echo "  ⚠ $pkg/ not found (may be single-file)"; fi
          done

      - name: Build for simulator
        run: flutter build ios --simulator --debug

      - name: Install Python into simulator app
        run: |
          chmod +x scripts/post_build.sh
          bash scripts/post_build.sh \
            build/ios/iphonesimulator/Runner.app \
            ios/Python.xcframework

      - name: Run simulator smoke test
        timeout-minutes: 8
        run: |
          set +e  # Don't exit on individual command failures

          # Create and boot simulator
          echo "$(date +%T) Creating simulator..."
          DEVICE_ID=$(xcrun simctl create "PythonTest" "iPhone 16")
          xcrun simctl boot "$DEVICE_ID"
          echo "$(date +%T) Simulator booted: $DEVICE_ID"

          # Install app
          xcrun simctl install "$DEVICE_ID" build/ios/iphonesimulator/Runner.app
          echo "$(date +%T) App installed"

          # Launch app (without --console to avoid PTY issues)
          xcrun simctl launch "$DEVICE_ID" com.obus.tidalApp
          echo "$(date +%T) App launched, waiting for initialization..."

          # Wait for Python to initialize
          sleep 15

          # Collect logs from the device (with 30s safety timeout)
          echo "$(date +%T) Collecting device logs..."
          ( xcrun simctl spawn "$DEVICE_ID" log show \
            --last 60s \
            --predicate 'process == "Runner"' \
            --style compact \
            2>&1 | head -2000 > /tmp/sim_logs.txt ) &
          LOG_PID=$!
          sleep 30
          kill $LOG_PID 2>/dev/null || true
          wait $LOG_PID 2>/dev/null || true
          echo "$(date +%T) Log collection done ($(wc -l < /tmp/sim_logs.txt) lines)"

          echo "=== Log output (filtered) ==="
          grep -i "python\|bridge\|tiddl\|error\|fatal\|crash\|import" /tmp/sim_logs.txt || echo "(no matching lines)"

          # Cleanup
          xcrun simctl shutdown "$DEVICE_ID" 2>/dev/null || true
          xcrun simctl delete "$DEVICE_ID" 2>/dev/null || true

          # Verify Python initialized
          if grep -q "Python initialized successfully" /tmp/sim_logs.txt; then
            echo "✅ PASS: Python initialized in simulator"
          elif grep -q "Failed to initialize Python" /tmp/sim_logs.txt; then
            echo "❌ FAIL: Python failed to initialize"
            exit 1
          elif grep -q "PythonBridge" /tmp/sim_logs.txt; then
            echo "⚠️ Plugin code ran but Python init status unclear - passing"
          else
            echo "⚠️ No PythonBridge log lines found - app may not have launched fully"
            echo "Full log line count: $(wc -l < /tmp/sim_logs.txt)"
          fi

          # Verify tiddl imports succeeded (logged by tiddl_bridge.py at startup)
          if grep -q "import tiddl.auth" /tmp/sim_logs.txt; then
            echo "✅ tiddl.auth importable"
          fi
          if grep "import" /tmp/sim_logs.txt | grep -q "✗"; then
            echo "❌ FAIL: Some imports failed!"
            grep "✗" /tmp/sim_logs.txt
            exit 1
          fi

  build-ios:
    name: 🍎 Build unsigned IPA
    runs-on: macos-latest
    needs: test-simulator
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate platform files
        run: flutter create --org com.obus --project-name tidal_app .

      - name: Configure iOS capabilities
        run: |
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" ios/Runner/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" ios/Runner/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :UIBackgroundModes:0 audio" ios/Runner/Info.plist

      - run: flutter pub get

      - name: Download Python iOS support
        run: |
          curl -sL -o python-ios.tar.gz \
            "https://github.com/beeware/Python-Apple-support/releases/download/${{ env.PYTHON_VERSION }}-${{ env.PYTHON_BUILD }}/Python-${{ env.PYTHON_VERSION }}-iOS-support.${{ env.PYTHON_BUILD }}.tar.gz"
          mkdir -p ios/PythonSupport
          tar xzf python-ios.tar.gz -C ios/PythonSupport

      - name: Place Python.xcframework
        run: mv ios/PythonSupport/Python.xcframework ios/Python.xcframework

      - name: Setup project for Python
        run: |
          cp scripts/PythonBridge.swift ios/Runner/PythonBridge.swift
          cp scripts/AudioBridge.swift ios/Runner/AudioBridge.swift
          cat > ios/Runner/AppDelegate.swift << 'SWIFT'
          import Flutter
          import UIKit

          @main
          @objc class AppDelegate: FlutterAppDelegate {
            override func application(
              _ application: UIApplication,
              didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?
            ) -> Bool {
              GeneratedPluginRegistrant.register(with: self)
              PythonBridgePlugin.register(with: self.registrar(forPlugin: "PythonBridgePlugin")!)
              AudioBridgePlugin.register(with: self.registrar(forPlugin: "AudioBridgePlugin")!)
              return super.application(application, didFinishLaunchingWithOptions: launchOptions)
            }
          }
          SWIFT
          gem install xcodeproj --no-document
          ruby scripts/setup_python.rb
          mkdir -p ios/Runner/python/app ios/Runner/python/app_packages

      - name: Install Python packages
        run: |
          python3 -m venv /tmp/pip-venv
          source /tmp/pip-venv/bin/activate
          pip install tiddl --target=python_packages_built --no-compile
          pip install certifi --target=python_packages_built --no-compile
          deactivate
          echo "Installed packages:"
          ls python_packages_built/

      - name: Clean packages for iOS
        run: |
          cd python_packages_built
          find . -name "*.so" -delete && find . -name "*.dylib" -delete
          find . -name "*.dist-info" -type d -exec rm -rf {} + 2>/dev/null || true
          find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find . \( -name "tests" -o -name "test" \) -type d -exec rm -rf {} + 2>/dev/null || true
          rm -rf pydantic pydantic_core ffmpeg_asyncio
          cd ..
          echo "Cleaned packages size: $(du -sh python_packages_built | cut -f1)"

      - name: Verify tiddl package integrity
        run: |
          for f in tiddl/__init__.py tiddl/core/__init__.py tiddl/core/auth/__init__.py tiddl/core/auth/api.py tiddl/core/api/__init__.py tiddl/core/api/api.py tiddl/core/utils/download.py tiddl/cli/utils/resource.py; do
            if [ -f "python_packages_built/$f" ]; then echo "  ✓ $f"
            else echo "  ✗ $f MISSING!"; exit 1; fi
          done

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Install Python into app bundle
        run: |
          chmod +x scripts/post_build.sh
          bash scripts/post_build.sh \
            build/ios/iphoneos/Runner.app \
            ios/Python.xcframework

      - name: Package IPA
        working-directory: build/ios/iphoneos
        run: |
          mkdir Payload
          mv Runner.app Payload/
          zip -qq -r -9 TidalApp.ipa Payload

      - name: Verify IPA contents
        working-directory: build/ios/iphoneos
        run: |
          echo "=== Verify Python bundle ==="
          ls -la Payload/Runner.app/python/ || { echo "FATAL: No python dir!"; exit 1; }
          echo "--- tiddl package ---"
          ls Payload/Runner.app/python/app_packages/tiddl/ || { echo "FATAL: tiddl missing from bundle!"; exit 1; }
          echo "--- app code ---"
          ls Payload/Runner.app/python/app/
          echo "--- app packages (all) ---"
          ls Payload/Runner.app/python/app_packages/
          echo "--- frameworks count ---"
          ls Payload/Runner.app/Frameworks/ | wc -l
          echo "--- IPA size ---"
          du -sh TidalApp.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TidalApp-unsigned
          path: build/ios/iphoneos/TidalApp.ipa
