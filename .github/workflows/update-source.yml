name: Update App Source

on:
  release:
    types: [published]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger app-source update
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
            https://api.github.com/repos/obus-schmobus/app-source/dispatches \
            -d '{"event_type":"update-source"}'
          echo "✓ Dispatched update to app-source"
